<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#07111f">
  <title>WFS Trip Readiness</title>

  <style>
    :root {
      --bg: #07111f;
      --panel: #0b1828;
      --panel2: #102238;
      --panel3: #142b44;
      --line: rgba(255,255,255,.10);
      --text: #eef6ff;
      --muted: #91a7bd;
      --accent: #22b8d6;
      --green: #39ca8c;
      --blue: #2aa9e2;
      --amber: #f1aa3d;
      --red: #ef6672;
      --purple: #d66ce8;
      --gray: #7d8fa2;
      --shadow: 0 18px 56px rgba(0,0,0,.28);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 85% 0, rgba(34,184,214,.11), transparent 34%),
        var(--bg);
      color: var(--text);
      font-family: Inter, Pretendard, "Segoe UI", Arial, sans-serif;
    }

    button, input, select { font: inherit; }

    .app { width: min(1450px, 100%); margin: 0 auto; padding: 16px; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      margin: -16px -16px 16px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      background: rgba(7,17,31,.90);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--line);
    }

    .brand { display: flex; align-items: center; gap: 11px; min-width: 0; }
    .brand-mark {
      width: 42px; height: 42px; border-radius: 12px;
      display: grid; place-items: center;
      background: linear-gradient(145deg, #0c4b64, #0a273b);
      border: 1px solid rgba(72,209,234,.28);
      color: #5bdcf0; font-weight: 900;
    }
    .brand h1 { margin: 0; font-size: 18px; }
    .brand p { margin: 3px 0 0; color: var(--muted); font-size: 11px; }

    .btn {
      border: 1px solid var(--line);
      border-radius: 11px;
      background: var(--panel2);
      color: var(--text);
      padding: 10px 13px;
      cursor: pointer;
    }
    .btn.primary { background: linear-gradient(135deg, #189fbd, #147f9f); border-color: transparent; }
    .btn:disabled { opacity: .55; cursor: not-allowed; }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(230px, 1fr) 140px 160px 135px 135px auto;
      gap: 9px;
      margin-bottom: 14px;
    }

    .input, .select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 11px;
      background: var(--panel);
      color: var(--text);
      padding: 11px 12px;
      outline: none;
    }
    .input:focus, .select:focus { border-color: rgba(72,209,234,.58); }




    .trip-list { display: grid; gap: 13px; }

    .trip-card {
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
      background: linear-gradient(145deg, rgba(11,24,40,.98), rgba(8,19,33,.98));
      box-shadow: var(--shadow);
    }

    .trip-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      padding: 15px;
      cursor: pointer;
      user-select: none;
    }

    .trip-title-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .trip-title { font-size: 19px; font-weight: 900; }
    .route { margin-top: 7px; font-size: 14px; font-weight: 750; color: #ceddeb; word-break: break-word; }
    .meta { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 11px; color: var(--muted); font-size: 11px; }
    .trip-badges { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; align-content: flex-start; }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 27px;
      padding: 5px 9px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.035);
      font-size: 10px;
      font-weight: 900;
      white-space: nowrap;
    }

    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--gray); }
    .s-confirmed .dot, .s-completed .dot, .s-ready .dot { background: var(--green); }
    .s-in-progress .dot { background: var(--blue); }
    .s-pending .dot { background: var(--amber); }
    .s-action-required .dot, .s-cancelled .dot, .c-red .dot, .c-error .dot { background: var(--red); }
    .s-required-no-status .dot { background: var(--purple); }
    .s-own .dot, .s-unknown .dot, .s-no-data .dot { background: var(--gray); }
    .c-yellow .dot, .c-amber .dot { background: var(--amber); }
    .c-green .dot { background: var(--green); }
    .c-blue .dot { background: var(--blue); }

    .trip-body { display: none; padding: 13px; border-top: 1px solid var(--line); background: rgba(4,12,22,.30); }
    .trip-card.open .trip-body { display: block; }

    .message-box {
      margin-bottom: 11px;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: rgba(255,255,255,.025);
      padding: 11px 12px;
    }
    .message-box h3 { margin: 0 0 7px; font-size: 11px; color: var(--muted); letter-spacing: .08em; }
    .message-title { font-size: 12px; line-height: 1.45; }
    .message-meta { margin-top: 5px; color: var(--muted); font-size: 10px; }

    .leg-card {
      margin-bottom: 11px;
      border: 1px solid var(--line);
      border-radius: 15px;
      overflow: hidden;
      background: var(--panel);
    }
    .leg-card:last-child { margin-bottom: 0; }

    .leg-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
      padding: 14px 13px;
      background: rgba(20,43,68,.50);
      border-bottom: 1px solid var(--line);
    }

    .leg-schedule-wrap {
      min-width: 0;
    }

    .leg-route {
      font-size: 15px;
      font-weight: 900;
      margin-bottom: 7px;
    }

    .leg-schedule-local {
      color: #eaf4ff;
      font-size: 12px;
      font-weight: 800;
      line-height: 1.45;
    }

    .leg-schedule-utc {
      margin-top: 2px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.45;
    }

    .leg-flags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 6px;
      color: var(--warning);
      font-size: 10px;
      font-weight: 800;
    }

    .leg-summary-pills {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 7px;
      max-width: 58%;
      padding-top: 1px;
    }

    .section {
      padding: 12px 13px;
      border-bottom: 1px solid var(--line);
    }
    .section:last-child { border-bottom: 0; }
    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 9px;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .08em;
      color: #d9e8f5;
    }

    .fp-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 7px;
    }
    .fp-item {
      padding: 9px 10px;
      border: 1px solid rgba(255,255,255,.075);
      border-radius: 10px;
      background: rgba(255,255,255,.025);
    }
    .fp-item label { display: block; color: var(--muted); font-size: 9px; margin-bottom: 6px; }

    .alert-list, .service-list { display: grid; gap: 7px; }
    .alert-row, .service-row {
      padding: 9px 10px;
      border: 1px solid rgba(255,255,255,.075);
      border-radius: 10px;
      background: rgba(255,255,255,.025);
    }
    .alert-main, .service-main, .child-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
    }
    .alert-desc, .service-name { min-width: 0; font-size: 12px; font-weight: 750; word-break: break-word; }
    .status { display: inline-flex; align-items: center; gap: 6px; font-size: 9px; font-weight: 900; white-space: nowrap; letter-spacing: .04em; }
    .note { margin-top: 5px; color: var(--muted); font-size: 10px; line-height: 1.45; }
    .required { margin-left: 5px; color: #efa5f8; font-size: 8px; font-weight: 900; }

    .child-list {
      display: grid;
      gap: 5px;
      margin-top: 8px;
      padding-top: 7px;
      border-top: 1px dashed rgba(255,255,255,.10);
    }
    .child-row { padding-left: 10px; color: #c6d6e4; font-size: 10px; }

    .station-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .station { padding: 12px 13px; min-width: 0; }
    .station + .station { border-left: 1px solid var(--line); }
    .station-title { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 9px; }
    .station-code { font-size: 16px; font-weight: 900; }
    .station-dir { color: var(--muted); font-size: 9px; letter-spacing: .08em; }

    .empty {
      padding: 18px;
      border: 1px dashed var(--line);
      border-radius: 12px;
      color: var(--muted);
      text-align: center;
      font-size: 11px;
    }

    .loading { display: none; padding: 28px 0; text-align: center; color: var(--muted); font-size: 12px; }
    .loading.show { display: block; }
    .spinner {
      width: 28px; height: 28px; margin: 0 auto 9px;
      border: 3px solid rgba(255,255,255,.10);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed;
      left: 50%; bottom: 20px;
      transform: translate(-50%, 18px);
      opacity: 0;
      pointer-events: none;
      z-index: 100;
      padding: 10px 13px;
      border: 1px solid var(--line);
      border-radius: 11px;
      background: #14283d;
      box-shadow: var(--shadow);
      font-size: 11px;
      transition: .18s;
      max-width: calc(100% - 28px);
      text-align: center;
    }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }


    .trip-filter-toolbar {
      grid-template-columns: minmax(150px, 220px);
      justify-content: end;
      margin-bottom: 14px;
    }

    .active-trip-panel {
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
      background: rgba(8, 25, 44, .72);
    }

    .active-trip-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--line);
    }

    .active-trip-heading h2 {
      margin: 0;
      font-size: 19px;
    }

    .active-trip-heading p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .trip-table-wrap {
      overflow-x: auto;
    }

    .trip-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 780px;
    }

    .trip-table th {
      padding: 13px 15px;
      text-align: left;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: .06em;
      border-bottom: 1px solid var(--line);
    }

    .trip-table td {
      padding: 16px 15px;
      border-bottom: 1px solid var(--line);
      vertical-align: middle;
      font-size: 13px;
    }

    .trip-row:hover {
      background: rgba(30, 160, 210, .05);
    }

    .trip-number-cell {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .route-btn {
      border: 0;
      border-radius: 9px;
      padding: 8px 12px;
      background: rgba(67, 151, 255, .18);
      color: #8fc5ff;
      font-weight: 800;
      font-size: 11px;
      cursor: pointer;
    }

    .route-btn:hover {
      background: rgba(67, 151, 255, .28);
    }

    .trip-detail-row {
      display: none;
    }

    .trip-detail-row.open {
      display: table-row;
    }

    .trip-detail-row > td {
      padding: 0;
      background: rgba(2, 12, 25, .48);
    }

    .trip-detail-inner {
      padding: 16px;
    }

    .trip-detail-top {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    @media (max-width: 1080px) {
      .toolbar { grid-template-columns: 1fr 1fr 1fr; }
    }

    @media (max-width: 720px) {
      .trip-filter-toolbar {
        grid-template-columns: 1fr;
      }

      .active-trip-heading {
        padding: 15px;
      }

      .active-trip-heading p {
        display: none;
      }

      .trip-table {
        min-width: 0;
      }

      .trip-table thead {
        display: none;
      }

      .trip-table,
      .trip-table tbody,
      .trip-table tr,
      .trip-table td {
        display: block;
        width: 100%;
      }

      .trip-row {
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
      }

      .trip-row td {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 7px 0;
        border: 0;
      }

      .trip-row td::before {
        content: attr(data-label);
        color: var(--muted);
        font-size: 10px;
        letter-spacing: .06em;
      }

      .trip-number-cell {
        width: 100%;
        justify-content: flex-end;
      }

      .trip-detail-row {
        display: none !important;
      }

      .trip-detail-row.open {
        display: block !important;
      }

      .trip-detail-row > td {
        display: block;
      }

      .trip-detail-top {
        display: block;
      }

      .trip-badges {
        margin-top: 10px;
        justify-content: flex-start;
      }

      .app { padding: 11px; }
      .topbar { margin: -11px -11px 13px; padding: 10px 11px; }
      .brand p { display: none; }
      .toolbar { grid-template-columns: 1fr 1fr; }
      .toolbar .wide { grid-column: 1 / -1; }
      .trip-head { grid-template-columns: 1fr; }
      .trip-badges { justify-content: flex-start; }
      .station-grid { grid-template-columns: 1fr; }
      .station + .station { border-left: 0; border-top: 1px solid var(--line); }
      .fp-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .leg-head {
        display: block;
      }

      .leg-summary-pills {
        max-width: none;
        margin-top: 10px;
        justify-content: flex-start;
      }
    }
  
    /* ===== 가독성 향상: 전체 글자 크기 확대 ===== */
    html {
      font-size: 17px;
    }

    body {
      font-size: 17px;
      line-height: 1.55;
    }

    .brand-title {
      font-size: 1.45rem;
    }

    .select,
    .input,
    button {
      font-size: 1rem;
    }

    .active-trip-heading h2 {
      font-size: 1.35rem;
    }

    .trip-table th {
      font-size: .82rem;
    }

    .trip-table td {
      font-size: 1rem;
    }

    .trip-number-cell strong {
      font-size: 1.05rem;
    }

    .route-btn {
      font-size: .84rem;
    }

    .route {
      font-size: 1.12rem;
    }

    .meta,
    .section-title,
    .station-label,
    .service-note,
    .child-service,
    .message-meta {
      font-size: .92rem;
    }

    .pill,
    .status {
      font-size: .84rem;
      padding: 6px 10px;
    }

    .leg-route {
      font-size: 1.12rem;
    }

    .leg-schedule-local {
      font-size: 1rem;
    }

    .leg-schedule-utc {
      font-size: .92rem;
    }

    .station-title {
      font-size: 1.18rem;
    }

    .service-name {
      font-size: 1.02rem;
    }

    .service-card,
    .message-box,
    .fp-item,
    .alert-item {
      font-size: 1rem;
    }

    @media (max-width: 720px) {
      html {
        font-size: 16px;
      }

      body {
        font-size: 16px;
      }

      .brand-title {
        font-size: 1.3rem;
      }

      .trip-table td {
        font-size: 1rem;
      }

      .leg-route {
        font-size: 1.08rem;
      }

      .leg-schedule-local {
        font-size: .98rem;
      }

      .leg-schedule-utc {
        font-size: .9rem;
      }

      .pill,
      .status {
        font-size: .82rem;
      }
    }


    /* ===== 상태 표시 통합 ===== */
    .s-in-progress {
      color: #ffb13b !important;
      border-color: rgba(255, 177, 59, .35) !important;
      background: rgba(255, 177, 59, .08) !important;
    }

    .s-in-progress .dot,
    .s-in-progress i {
      background: #ffb13b !important;
      box-shadow: 0 0 0 3px rgba(255, 177, 59, .10);
    }

    .s-pending {
      color: #ffb13b !important;
      border-color: rgba(255, 177, 59, .35) !important;
      background: rgba(255, 177, 59, .08) !important;
    }

    .s-pending .dot,
    .s-pending i {
      background: #ffb13b !important;
      box-shadow: 0 0 0 3px rgba(255, 177, 59, .10);
    }

    /* Handling 하위항목 등 세부 텍스트 확대 */
    .child-service {
      font-size: 1rem !important;
      line-height: 1.7 !important;
      padding: 4px 0 !important;
    }

    .child-service span:first-child {
      font-size: 1rem !important;
    }

    .child-service .status,
    .child-service .pill {
      font-size: .9rem !important;
    }

    .service-note {
      font-size: .95rem !important;
      line-height: 1.55 !important;
    }

    @media (max-width: 720px) {
      .child-service,
      .child-service span:first-child {
        font-size: .98rem !important;
      }

      .child-service .status,
      .child-service .pill {
        font-size: .86rem !important;
      }
    }


    /* ===== 상태 색상 원래 구분 ===== */
    .s-action-required {
      color: #ff657a !important;
      border-color: rgba(255, 101, 122, .42) !important;
      background: rgba(255, 101, 122, .10) !important;
    }

    .s-action-required .dot,
    .s-action-required i {
      background: #ff657a !important;
      box-shadow: 0 0 0 3px rgba(255, 101, 122, .12) !important;
    }

    .s-pending {
      color: #ffb13b !important;
      border-color: rgba(255, 177, 59, .38) !important;
      background: rgba(255, 177, 59, .08) !important;
    }

    .s-pending .dot,
    .s-pending i {
      background: #ffb13b !important;
      box-shadow: 0 0 0 3px rgba(255, 177, 59, .10) !important;
    }

    .s-in-progress {
      color: #35bdf3 !important;
      border-color: rgba(53, 189, 243, .38) !important;
      background: rgba(53, 189, 243, .08) !important;
    }

    .s-in-progress .dot,
    .s-in-progress i {
      background: #35bdf3 !important;
      box-shadow: 0 0 0 3px rgba(53, 189, 243, .10) !important;
    }

    /* ===== 상위 Trip 행과 상세영역 시각적 구분 ===== */
    .trip-detail-row > td {
      padding: 0 !important;
      background: #06111f !important;
      border-bottom: 2px solid rgba(77, 174, 230, .28) !important;
    }

    .trip-detail-shell {
      margin: 14px 18px 20px;
      border: 1px solid rgba(77, 174, 230, .34);
      border-left: 5px solid #35bdf3;
      border-radius: 15px;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(19, 47, 76, .72), rgba(7, 21, 36, .96));
      box-shadow:
        0 14px 30px rgba(0, 0, 0, .24),
        inset 0 1px 0 rgba(255, 255, 255, .035);
    }

    .trip-detail-label {
      padding: 9px 15px;
      background: rgba(53, 189, 243, .12);
      border-bottom: 1px solid rgba(77, 174, 230, .30);
      color: #7fd8ff;
      font-size: .78rem;
      font-weight: 900;
      letter-spacing: .12em;
    }

    .trip-detail-inner {
      padding: 18px !important;
      background: transparent !important;
    }

    .trip-detail-top {
      padding: 2px 2px 14px;
      margin-bottom: 16px !important;
      border-bottom: 1px solid rgba(77, 174, 230, .24);
    }

    .trip-detail-top .route {
      color: #ffffff;
      font-size: 1.18rem;
    }

    .leg-card {
      border: 1px solid rgba(90, 145, 190, .32) !important;
      background: rgba(7, 22, 38, .88) !important;
      box-shadow: 0 8px 20px rgba(0, 0, 0, .18);
    }

    .leg-card + .leg-card {
      margin-top: 18px;
    }

    .leg-head {
      background:
        linear-gradient(90deg, rgba(26, 67, 105, .72), rgba(16, 42, 69, .72)) !important;
      border-bottom: 1px solid rgba(90, 145, 190, .34) !important;
    }

    .station-grid {
      background: rgba(3, 15, 27, .38);
    }

    @media (max-width: 720px) {
      .trip-detail-shell {
        margin: 10px 8px 14px;
        border-left-width: 4px;
      }

      .trip-detail-inner {
        padding: 12px !important;
      }

      .trip-detail-label {
        font-size: .72rem;
      }
    }


    /* 상태 라벨은 과도한 Bold를 제거해 본문과 자연스럽게 구분 */
    .status,
    .pill,
    .service-status,
    .child-service .status,
    .child-service .pill,
    .leg-status .status,
    .leg-status .pill {
      font-weight: 600 !important;
    }

    .child-service {
      font-weight: 400 !important;
    }

    .child-service span:first-child {
      font-weight: 400 !important;
    }


    /* ===== Leg별 상태 요약 ===== */
    .leg-summary-pills .pill {
      font-weight: 500 !important;
    }

    /* REQUIRED 보조 라벨은 일반 굵기 */
    .required,
    .required-tag,
    .service-required,
    .required-label {
      font-weight: 400 !important;
    }

    /* 하위 상세 정보는 전체적으로 일반 굵기 */
    .service-card,
    .service-card *,
    .child-service,
    .child-service *,
    .service-note,
    .service-note *,
    .station-grid,
    .station-grid * {
      font-weight: 400 !important;
    }

    /* 다만 서비스명/공항명은 가독성을 위해 중간 굵기만 유지 */
    .station-title,
    .service-name,
    .service-card > .service-row > strong,
    .service-card .service-title {
      font-weight: 600 !important;
    }

    /* 상태 라벨도 일반~중간 굵기 */
    .service-card .status,
    .service-card .pill,
    .child-service .status,
    .child-service .pill {
      font-weight: 500 !important;
    }

    @media (max-width: 720px) {
      .leg-summary-pills {
        width: 100%;
      }
    }


    /* ===== 요청 반영 ===== */

    /* Trip route 상태 밑줄 */
    .route {
      display: inline-block;
      padding-bottom: 7px;
      border-bottom: 4px solid transparent;
    }

    .route-status-confirmed {
      border-bottom-color: #34d399 !important;
    }

    .route-status-pending {
      border-bottom-color: #ffb13b !important;
    }

    .route-status-neutral {
      border-bottom-color: rgba(148, 163, 184, .45) !important;
    }

    /* LEG 제목과 스케줄은 일반 굵기 */
    .leg-route,
    .leg-schedule-local,
    .leg-schedule-utc {
      font-weight: 400 !important;
    }

    /* REQUIRED 보조 라벨은 일반 굵기 */
    .required,
    .required-tag,
    .service-required,
    .required-label {
      font-weight: 400 !important;
    }

    /* 하위 서비스 항목 글자 확대 */
    .child-service,
    .child-service span:first-child {
      font-size: 1.06rem !important;
      line-height: 1.75 !important;
      font-weight: 400 !important;
    }

    .child-service .status,
    .child-service .pill {
      font-size: .95rem !important;
      font-weight: 500 !important;
    }

    @media (max-width: 720px) {
      .child-service,
      .child-service span:first-child {
        font-size: 1rem !important;
      }

      .child-service .status,
      .child-service .pill {
        font-size: .9rem !important;
      }
    }


    /* Handling 하위항목 실제 클래스(child-row) 글자 확대 */
    .child-list {
      gap: 4px !important;
      margin-top: 8px !important;
    }

    .child-row {
      padding: 6px 10px 6px 12px !important;
      font-size: 1rem !important;
      line-height: 1.55 !important;
      color: #d8e7f3 !important;
      font-weight: 400 !important;
    }

    .child-row > span:first-child {
      font-size: 1rem !important;
      font-weight: 400 !important;
    }

    .child-row .status,
    .child-row .pill {
      font-size: .92rem !important;
      font-weight: 500 !important;
    }

    @media (max-width: 720px) {
      .child-row,
      .child-row > span:first-child {
        font-size: .98rem !important;
      }

      .child-row .status,
      .child-row .pill {
        font-size: .88rem !important;
      }
    }


    /* 출/도착 공항 코드를 회색 캡슐형 배지로 표시 */
    .station-title {
      display: flex !important;
      justify-content: space-between !important;
      align-items: center !important;
      gap: 12px !important;
      margin-bottom: 10px !important;
    }

    .station-code {
      display: inline-flex !important;
      align-items: center !important;
      min-height: 34px !important;
      padding: 6px 14px !important;
      border-radius: 999px !important;
      background: linear-gradient(180deg, rgba(146, 163, 184, .28), rgba(103, 120, 142, .22)) !important;
      border: 1px solid rgba(170, 186, 205, .22) !important;
      color: #eef5fb !important;
      font-size: 1.08rem !important;
      font-weight: 700 !important;
      letter-spacing: .01em !important;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
    }

    .station-dir {
      color: #8eb8db !important;
      font-size: .68rem !important;
      letter-spacing: .14em !important;
      font-weight: 500 !important;
    }

    @media (max-width: 720px) {
      .station-code {
        min-height: 32px !important;
        padding: 5px 12px !important;
        font-size: 1rem !important;
      }

      .station-dir {
        font-size: .64rem !important;
      }
    }

</style>
</head>

<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">W</div>
        <div>
          <h1>WFS Trip Readiness</h1>
          <p>Trip · Flight Planning · Alerts · Services</p>
        </div>
      </div>
      <button class="btn primary" id="refreshBtn">↻ 새로고침</button>
    </header>

    <section class="toolbar trip-filter-toolbar">
      <select class="select" id="aircraftFilter">
        <option value="">전체 기체</option>
      </select>
    </section>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      WFS Trip 준비 상태를 불러오는 중입니다.
    </div>

    <main class="trip-list" id="tripList"></main>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    /* Apps Script 웹 앱 배포 URL로 변경 */
    const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbydB2lQ3zfDXFFGpJV5qHe_B7HM48f4v_03f8hYGlCSfmC9CS99kGWvQ_IMTYh-X_X-hg/exec';

    const state = { response: null, trips: [] };

    const el = {
      refreshBtn: document.getElementById('refreshBtn'),
      aircraftFilter: document.getElementById('aircraftFilter'),
      loading: document.getElementById('loading'),
      tripList: document.getElementById('tripList'),
      toast: document.getElementById('toast')
    };


    function init() {
      bindEvents();
      loadDashboard(false);
    }


    function bindEvents() {
      el.refreshBtn.addEventListener('click', function () { loadDashboard(true); });
      el.aircraftFilter.addEventListener('change', applyLocalFilters);

      el.tripList.addEventListener('click', function (event) {
        const button = event.target.closest('.route-btn');
        if (!button) return;

        const detailId = button.getAttribute('data-detail-id');
        const detail = document.getElementById(detailId);
        if (!detail) return;

        const isOpen = detail.classList.toggle('open');
        button.textContent = isOpen ? '닫기' : 'ROUTE';
        button.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
      });
    }


    async function loadDashboard(force) {
      if (!BACKEND_URL || BACKEND_URL.includes('PASTE_YOUR')) {
        renderEmpty('BACKEND_URL에 Apps Script 웹 앱 배포 URL을 입력하세요.');
        return;
      }

      setLoading(true);

      try {
        const response = await jsonp(BACKEND_URL, {
          action: force ? 'refresh' : 'dashboard',
          force: force ? '1' : '0',
          daysPast: '1',
          daysFuture: '90',
          maxTrips: '20'
        }, 180000);

        if (!response || (!response.success && !response.partialSuccess)) {
          throw new Error(response && response.message ? response.message : '조회 실패');
        }

        state.response = response;
        state.trips = response.trips || [];

        updateAircraftFilter(state.trips);
        applyLocalFilters();

        if (response.errors && response.errors.length) {
          showToast('일부 API 조회 실패: ' + response.errors.length + '건');
        }

      } catch (err) {
        renderEmpty(err.message || String(err));
        showToast(err.message || String(err));
      } finally {
        setLoading(false);
      }
    }


    function applyLocalFilters() {
      const aircraft = el.aircraftFilter.value.trim().toUpperCase();

      const filtered = state.trips.filter(function (trip) {
        return !aircraft ||
          String(trip.aircraftRegistry || '')
            .trim()
            .toUpperCase() === aircraft;
      });

      renderTrips(filtered);
    }


    function updateAircraftFilter(trips) {
      const current = el.aircraftFilter.value;

      const tails = Array.from(
        new Set(
          (trips || [])
            .map(function (trip) {
              return String(trip.aircraftRegistry || '')
                .trim()
                .toUpperCase();
            })
            .filter(Boolean)
        )
      ).sort();

      el.aircraftFilter.innerHTML =
        '<option value="">전체 기체</option>' +
        tails.map(function (tail) {
          return '<option value="' + esc(tail) + '">' +
            esc(tail) +
            '</option>';
        }).join('');

      if (tails.indexOf(current) >= 0) {
        el.aircraftFilter.value = current;
      }
    }


    function renderTrips(trips) {
      if (!trips.length) {
        renderEmpty('조건에 맞는 Trip이 없습니다.');
        return;
      }

      el.tripList.innerHTML = `
        <section class="active-trip-panel">
          <div class="active-trip-heading">
            <div>
              <h2>Active Trip</h2>
              <p>TRIP NUMBER로 조회하고 ROUTE 버튼에서 상세 준비상태를 확인할 수 있습니다.</p>
            </div>
          </div>

          <div class="trip-table-wrap">
            <table class="trip-table">
              <thead>
                <tr>
                  <th>TRIP NUMBER</th>
                  <th>A/C</th>
                  <th>STATUS</th>
                  <th>FROM</th>
                  <th>TO</th>
                  <th>LEGS</th>
                </tr>
              </thead>
              <tbody>
                ${trips.map(renderTrip).join('')}
              </tbody>
            </table>
          </div>
        </section>
      `;
    }


    function renderTrip(trip, index) {
      const title = trip.tripNumber || trip.tripName || ('Trip ' + trip.tripId.slice(0, 8));
      const detailId = 'tripDetail_' + index + '_' + String(trip.tripId || '').replace(/[^a-zA-Z0-9]/g, '');
      const startDate = formatDateOnly(trip.startLocal || trip.startUtc);
      const endDate = formatDateOnly(trip.endLocal || trip.endUtc);

      return `
        <tr class="trip-row">
          <td data-label="TRIP NUMBER">
            <div class="trip-number-cell">
              <strong>${esc(title)}</strong>
              <button
                class="route-btn"
                type="button"
                data-detail-id="${esc(detailId)}"
                aria-expanded="false"
              >ROUTE</button>
            </div>
          </td>
          <td data-label="A/C"><strong>${esc(trip.aircraftRegistry || 'N/A')}</strong></td>
          <td data-label="STATUS">${statusPill(trip.overallStatus)}</td>
          <td data-label="FROM">${esc(startDate)}</td>
          <td data-label="TO">${esc(endDate)}</td>
          <td data-label="LEGS"><strong>${trip.legCount || 0}</strong></td>
        </tr>

        <tr class="trip-detail-row" id="${esc(detailId)}">
          <td colspan="6">
            <div class="trip-detail-shell">
              <div class="trip-detail-label">TRIP DETAIL</div>

              <div class="trip-detail-inner">
                <div class="trip-detail-top">
                <div>
                  <div class="route route-status-${routeUnderlineClass(trip)}">${esc(trip.route || 'Route 없음')}</div>
                </div>


              </div>

                ${(trip.legs || []).map(renderLeg).join('')}
              </div>
            </div>
          </td>
        </tr>
      `;
    }


    function routeUnderlineClass(trip) {
      const summary = trip && trip.summary ? trip.summary : {};

      // NO STATUS는 밑줄 색상 판정에 영향을 주지 않음
      if (Number(summary.pending || 0) > 0 ||
          Number(summary.inProgress || 0) > 0) {
        return 'pending';
      }

      const actionableCount =
        Number(summary.confirmed || 0) +
        Number(summary.completed || 0) +
        Number(summary.own || 0);

      if (actionableCount > 0 &&
          Number(summary.pending || 0) === 0 &&
          Number(summary.inProgress || 0) === 0) {
        return 'confirmed';
      }

      return 'neutral';
    }


    function renderMessageBox(trip) {
      if (!trip.latestMessage) return '';
      const m = trip.latestMessage;

      return `
        <section class="message-box">
          <h3>TRIP MESSAGES · ${trip.messages.length}</h3>
          <div class="message-title">${esc(m.title)}</div>
          <div class="message-meta">
            ${esc(m.direction || '')} · ${esc(formatUtc(m.dateSent))} · ATTACHMENTS ${m.numAttachments || 0}
          </div>
        </section>
      `;
    }


    function renderLeg(leg) {
      const alerts = leg.annunciators || {};
      const dep = leg.stations && leg.stations.departure || {};
      const arr = leg.stations && leg.stations.arrival || {};
      const enr = leg.stations && leg.stations.enroute || {};

      return `
        <section class="leg-card">
          <div class="leg-head">
            <div class="leg-schedule-wrap">
              <div class="leg-route">
                LEG ${leg.legNo} · ${esc(leg.from)} → ${esc(leg.to)}
              </div>

              <div class="leg-schedule-local">
                ${esc(formatLocalSchedule(leg.departureLocal, leg.arrivalLocal))}
              </div>

              <div class="leg-schedule-utc">
                (${esc(formatUtcSchedule(leg.departureUtc, leg.arrivalUtc))})
              </div>

              <div class="leg-flags">
                ${leg.depIsTba ? '<span>TBA</span>' : ''}
                ${leg.depIsTentative ? '<span>TENTATIVE</span>' : ''}
              </div>
            </div>

            <div class="leg-summary-pills">
              ${countPill('CONFIRMED', (leg.summary || {}).confirmed)}
              ${countPill('IN PROGRESS', (leg.summary || {}).inProgress)}
              ${countPill('PENDING', (leg.summary || {}).pending)}
              ${countPill('REQUIRED_NO_STATUS', (leg.summary || {}).requiredNoStatus)}
              ${countPill('OWN', (leg.summary || {}).own)}
            </div>
          </div>

          ${(alerts.items || []).length ? `
            <div class="section">
              <div class="section-title">
                <span>ACTION ITEMS / ANNUNCIATORS</span>
                <span>${esc(alerts.aggregatedStatus || '')}</span>
              </div>
              <div class="alert-list">
                ${alerts.items.map(renderAlert).join('')}
              </div>
            </div>
          ` : ''}

          <div class="station-grid">
            ${renderStation(dep, 'DEPARTURE')}
            ${renderStation(arr, 'ARRIVAL')}
          </div>

          ${(enr.services || []).length ? `
            <div class="section">
              ${renderStation(enr, 'ENROUTE')}
            </div>
          ` : ''}
        </section>
      `;
    }


    function fpItem(label, status) {
      return `
        <div class="fp-item">
          <label>${esc(label)}</label>
          ${statusPill(status)}
        </div>
      `;
    }


    function renderAlert(item) {
      const cls = 'c-' + String(item.color || 'gray').toLowerCase();
      return `
        <div class="alert-row">
          <div class="alert-main">
            <div class="alert-desc">${esc(item.description || item.type || 'Alert')}</div>
            <span class="status ${cls}"><span class="dot"></span>${esc(item.color || '')}</span>
          </div>
          ${item.type ? '<div class="note">' + esc(item.type) + '</div>' : ''}
        </div>
      `;
    }


    function renderStation(station, direction) {
      const services = station.services || [];
      return `
        <div class="station">
          <div class="station-title">
            <div class="station-code">${esc(station.icao || direction)}</div>
            <div class="station-dir">${esc(direction)}</div>
          </div>
          <div class="service-list">
            ${services.length ? services.map(renderService).join('') : '<div class="empty">표시할 서비스 없음</div>'}
          </div>
        </div>
      `;
    }


    function renderService(service) {
      const name = service.confirmationNumber
        ? service.name + ' (' + service.confirmationNumber + ')'
        : service.name;

      const details = [
        service.confirmedBy ? 'Confirmed by ' + service.confirmedBy : '',
        service.confirmedAtUtc ? formatUtc(service.confirmedAtUtc) : '',
        service.notes || ''
      ].filter(Boolean).join(' · ');

      return `
        <div class="service-row">
          <div class="service-main">
            <div class="service-name">
              ${esc(name)}
              ${service.required ? '<span class="required">REQUIRED</span>' : ''}
            </div>
            ${statusPill(service.status, true)}
          </div>
          ${details ? '<div class="note">' + esc(details) + '</div>' : ''}
          ${(service.children || []).length ? `
            <div class="child-list">
              ${service.children.map(function (child) {
                return `
                  <div class="child-row">
                    <span>${esc(child.name)}</span>
                    ${statusPill(child.status, true)}
                  </div>
                `;
              }).join('')}
            </div>
          ` : ''}
        </div>
      `;
    }


    function statusPill(status, compact) {
      const s = status || 'UNKNOWN';
      return `<span class="${compact ? 'status' : 'pill'} ${statusClass(s)}"><span class="dot"></span>${esc(statusLabel(s))}</span>`;
    }


    function countPill(status, count) {
      if (!count) return '';
      return `<span class="pill ${statusClass(status)}"><span class="dot"></span>${esc(statusLabel(status))} ${count}</span>`;
    }


    function statusClass(status) {
      return 's-' + String(status || 'unknown')
        .toLowerCase()
        .replace(/_/g, '-')
        .replace(/\s+/g, '-');
    }


    function statusLabel(status) {
      if (status === 'REQUIRED_NO_STATUS') {
        return 'NO STATUS';
      }

      return status || 'UNKNOWN';
    }


    function renderEmpty(message) {
      el.tripList.innerHTML = '<div class="empty">' + esc(message) + '</div>';
    }


    function setLoading(show) {
      el.loading.classList.toggle('show', !!show);
      el.refreshBtn.disabled = !!show;
    }


    function jsonp(url, params, timeoutMs) {
      return new Promise(function (resolve, reject) {
        const cb = '__wfsTrip_' + Date.now() + '_' + Math.random().toString(36).slice(2);
        const script = document.createElement('script');
        const timer = setTimeout(function () {
          cleanup();
          reject(new Error('백엔드 응답 시간이 초과되었습니다.'));
        }, timeoutMs || 120000);

        function cleanup() {
          clearTimeout(timer);
          if (script.parentNode) script.parentNode.removeChild(script);
          try { delete window[cb]; } catch (e) {}
        }

        window[cb] = function (data) {
          cleanup();
          resolve(data);
        };

        const q = new URLSearchParams(Object.assign({}, params, { callback: cb }));
        script.src = url + (url.includes('?') ? '&' : '?') + q.toString();
        script.onerror = function () {
          cleanup();
          reject(new Error('백엔드 연결에 실패했습니다.'));
        };
        document.head.appendChild(script);
      });
    }


    function formatDateTime(value) {
      if (!value) return '-';
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return value;
      return new Intl.DateTimeFormat('ko-KR', {
        year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit'
      }).format(d);
    }


    function formatLocalSchedule(departure, arrival) {
      return formatDateTimeSuffix(departure, 'L') +
        ' → ' +
        formatDateTimeSuffix(arrival, 'L');
    }


    function formatUtcSchedule(departure, arrival) {
      return formatDateTimeSuffix(departure, 'Z') +
        ' → ' +
        formatDateTimeSuffix(arrival, 'Z');
    }


    function formatDateTimeSuffix(value, suffix) {
      if (!value) return '-';

      const text = String(value)
        .replace('T', ' ')
        .replace(/Z$/i, '')
        .slice(0, 16);

      return text + suffix;
    }


    function formatUtc(value) {
      if (!value) return '-';
      const s = String(value).replace('T', ' ');
      return s.endsWith('Z') ? s.slice(0, 16) + 'Z' : s.slice(0, 16) + 'Z';
    }


    function formatDateOnly(value) {
      if (!value) return '-';
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return String(value).slice(0, 10);

      return [
        d.getFullYear(),
        String(d.getMonth() + 1).padStart(2, '0'),
        String(d.getDate()).padStart(2, '0')
      ].join('-');
    }


    function formatRange(start, end) {
      if (!start && !end) return 'DATE N/A';
      return localShort(start) + ' – ' + localShort(end);
    }


    function localShort(value) {
      return value ? String(value).replace('T', ' ').slice(0, 16) : '-';
    }


    function formatDuration(minutes) {
      const n = Number(minutes || 0);
      if (!n) return '-';
      const h = Math.floor(n / 60);
      const m = n % 60;
      return h ? h + 'H ' + m + 'M' : m + 'M';
    }


    function esc(value) {
      return String(value == null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }


    function showToast(message) {
      el.toast.textContent = message;
      el.toast.classList.add('show');
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(function () {
        el.toast.classList.remove('show');
      }, 3400);
    }


    init();
  </script>
</body>
