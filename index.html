<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#07111f">
  <title>WFS Trip Readiness</title>

  <style>
    :root {
      --bg: #07111f;
      --panel: #0b1828;
      --panel2: #102238;
      --panel3: #142b44;
      --line: rgba(255,255,255,.10);
      --text: #eef6ff;
      --muted: #91a7bd;
      --accent: #22b8d6;
      --green: #39ca8c;
      --blue: #2aa9e2;
      --amber: #f1aa3d;
      --red: #ef6672;
      --purple: #d66ce8;
      --gray: #7d8fa2;
      --shadow: 0 18px 56px rgba(0,0,0,.28);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 85% 0, rgba(34,184,214,.11), transparent 34%),
        var(--bg);
      color: var(--text);
      font-family: Inter, Pretendard, "Segoe UI", Arial, sans-serif;
    }

    button, input, select { font: inherit; }

    .app { width: min(1450px, 100%); margin: 0 auto; padding: 16px; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      margin: -16px -16px 16px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      background: rgba(7,17,31,.90);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--line);
    }

    .brand { display: flex; align-items: center; gap: 11px; min-width: 0; }
    .brand-mark {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      overflow: hidden;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(72,209,234,.28);
      flex: 0 0 auto;
    }

    .brand-mark img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      padding: 3px;
    }
    .brand h1 { margin: 0; font-size: 18px; }
    .brand p { margin: 3px 0 0; color: var(--muted); font-size: 11px; }

    .btn {
      border: 1px solid var(--line);
      border-radius: 11px;
      background: var(--panel2);
      color: var(--text);
      padding: 10px 13px;
      cursor: pointer;
    }
    .btn.primary { background: linear-gradient(135deg, #189fbd, #147f9f); border-color: transparent; }
    .btn:disabled { opacity: .55; cursor: not-allowed; }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(230px, 1fr) 140px 160px 135px 135px auto;
      gap: 9px;
      margin-bottom: 14px;
    }

    .input, .select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 11px;
      background: var(--panel);
      color: var(--text);
      padding: 11px 12px;
      outline: none;
    }
    .input:focus, .select:focus { border-color: rgba(72,209,234,.58); }




    .trip-list { display: grid; gap: 13px; }

    .trip-card {
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
      background: linear-gradient(145deg, rgba(11,24,40,.98), rgba(8,19,33,.98));
      box-shadow: var(--shadow);
    }
/* 상단 대제목 영역 */
.topbar {
  background:
    linear-gradient(
      135deg,
      rgba(14, 39, 66, 0.98),
      rgba(7, 24, 43, 0.98)
    ) !important;

  border: 1px solid rgba(73, 174, 224, 0.22);
  border-radius: 0 0 18px 18px;

  padding: 20px 22px !important;
  box-shadow:
    0 12px 28px rgba(0, 0, 0, 0.22),
    inset 0 -1px 0 rgba(255, 255, 255, 0.03);
}

/* 로고 확대 */
.brand-mark {
  width: 88px !important;
  height: 88px !important;
  flex: 0 0 88px !important;
  border-radius: 22px !important;

  background: rgba(255, 255, 255, 0.06) !important;
  border: 1px solid rgba(82, 188, 231, 0.35) !important;
}

.brand-mark img {
  width: 100% !important;
  height: 100% !important;
  object-fit: contain !important;
  padding: 6px !important;
}

/* 제목 */
.brand h1 {
  margin: 0;
  font-size: 2.1rem !important;
  font-weight: 900 !important;
  color: #ffffff !important;
}

/* 부제목 */
.brand p {
  margin: 7px 0 0;
  font-size: 1.05rem !important;
  color: #a8c2d8 !important;
}

/* 모바일 */
@media (max-width: 720px) {
  .topbar {
    padding: 14px 15px !important;
    border-radius: 0 0 14px 14px;
  }

  .brand-mark {
    width: 68px !important;
    height: 68px !important;
    flex-basis: 68px !important;
    border-radius: 18px !important;
  }

  .brand h1 {
    font-size: 1.75rem !important;
  }

  .brand p {
    font-size: .9rem !important;
  }
}
    .trip-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      padding: 15px;
      cursor: pointer;
      user-select: none;
    }

    .trip-title-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .trip-title { font-size: 19px; font-weight: 900; }
    .route { margin-top: 7px; font-size: 14px; font-weight: 750; color: #ceddeb; word-break: break-word; }
    .meta { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 11px; color: var(--muted); font-size: 11px; }
    .trip-badges { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; align-content: flex-start; }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 27px;
      padding: 5px 9px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.035);
      font-size: 10px;
      font-weight: 900;
      white-space: nowrap;
    }

    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--gray); }
    .s-confirmed .dot, .s-completed .dot, .s-ready .dot { background: var(--green); }
    .s-in-progress .dot { background: var(--blue); }
    .s-pending .dot { background: var(--amber); }
    .s-action-required .dot, .s-cancelled .dot, .c-red .dot, .c-error .dot { background: var(--red); }
    .s-required-no-status .dot { background: var(--purple); }
    .s-own .dot, .s-unknown .dot, .s-no-data .dot { background: var(--gray); }
    .c-yellow .dot, .c-amber .dot { background: var(--amber); }
    .c-green .dot { background: var(--green); }
    .c-blue .dot { background: var(--blue); }

    .trip-body { display: none; padding: 13px; border-top: 1px solid var(--line); background: rgba(4,12,22,.30); }
    .trip-card.open .trip-body { display: block; }

    .message-box {
      margin-bottom: 11px;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: rgba(255,255,255,.025);
      padding: 11px 12px;
    }
    .message-box h3 { margin: 0 0 7px; font-size: 11px; color: var(--muted); letter-spacing: .08em; }
    .message-title { font-size: 12px; line-height: 1.45; }
    .message-meta { margin-top: 5px; color: var(--muted); font-size: 10px; }

    .leg-card {
      margin-bottom: 11px;
      border: 1px solid var(--line);
      border-radius: 15px;
      overflow: hidden;
      background: var(--panel);
    }
    .leg-card:last-child { margin-bottom: 0; }

    .leg-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
      padding: 14px 13px;
      background: rgba(20,43,68,.50);
      border-bottom: 1px solid var(--line);
    }

    .leg-schedule-wrap {
      min-width: 0;
    }

    .leg-route {
      font-size: 15px;
      font-weight: 900;
      margin-bottom: 7px;
    }

    .leg-schedule-local {
      color: #eaf4ff;
      font-size: 12px;
      font-weight: 800;
      line-height: 1.45;
    }

    .leg-schedule-utc {
      margin-top: 2px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.45;
    }

    .leg-flags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 6px;
      color: var(--warning);
      font-size: 10px;
      font-weight: 800;
    }

    .leg-summary-pills {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 7px;
      max-width: 58%;
      padding-top: 1px;
    }

    .section {
      padding: 12px 13px;
      border-bottom: 1px solid var(--line);
    }
    .section:last-child { border-bottom: 0; }
    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 9px;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .08em;
      color: #d9e8f5;
    }

    .fp-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 7px;
    }
    .fp-item {
      padding: 9px 10px;
      border: 1px solid rgba(255,255,255,.075);
      border-radius: 10px;
      background: rgba(255,255,255,.025);
    }
    .fp-item label { display: block; color: var(--muted); font-size: 9px; margin-bottom: 6px; }

    .alert-list, .service-list { display: grid; gap: 7px; }
    .alert-row, .service-row {
      padding: 9px 10px;
      border: 1px solid rgba(255,255,255,.075);
      border-radius: 10px;
      background: rgba(255,255,255,.025);
    }
    .alert-main, .service-main, .child-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
    }
    .alert-desc, .service-name { min-width: 0; font-size: 12px; font-weight: 750; word-break: break-word; }
    .status { display: inline-flex; align-items: center; gap: 6px; font-size: 9px; font-weight: 900; white-space: nowrap; letter-spacing: .04em; }
    .note { margin-top: 5px; color: var(--muted); font-size: 10px; line-height: 1.45; }
    .required { margin-left: 5px; color: #efa5f8; font-size: 8px; font-weight: 900; }

    .child-list {
      display: grid;
      gap: 5px;
      margin-top: 8px;
      padding-top: 7px;
      border-top: 1px dashed rgba(255,255,255,.10);
    }
    .child-row { padding-left: 10px; color: #c6d6e4; font-size: 10px; }

    .station-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .station { padding: 12px 13px; min-width: 0; }
    .station + .station { border-left: 1px solid var(--line); }
    .station-title { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 9px; }
    .station-code { font-size: 16px; font-weight: 900; }
    .station-dir { color: var(--muted); font-size: 9px; letter-spacing: .08em; }

    .empty {
      padding: 18px;
      border: 1px dashed var(--line);
      border-radius: 12px;
      color: var(--muted);
      text-align: center;
      font-size: 11px;
    }

    .loading { display: none; padding: 28px 0; text-align: center; color: var(--muted); font-size: 12px; }
    .loading.show { display: block; }
    .spinner {
      width: 28px; height: 28px; margin: 0 auto 9px;
      border: 3px solid rgba(255,255,255,.10);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed;
      left: 50%; bottom: 20px;
      transform: translate(-50%, 18px);
      opacity: 0;
      pointer-events: none;
      z-index: 100;
      padding: 10px 13px;
      border: 1px solid var(--line);
      border-radius: 11px;
      background: #14283d;
      box-shadow: var(--shadow);
      font-size: 11px;
      transition: .18s;
      max-width: calc(100% - 28px);
      text-align: center;
    }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }


    .trip-filter-toolbar {
      grid-template-columns: minmax(150px, 220px);
      justify-content: end;
      margin-bottom: 14px;
    }

    .active-trip-panel {
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
      background: rgba(8, 25, 44, .72);
    }

    .active-trip-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--line);
    }

    .active-trip-heading h2 {
      margin: 0;
      font-size: 19px;
    }

    .active-trip-heading p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .trip-table-wrap {
      overflow-x: auto;
    }

    .trip-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 780px;
    }

    .trip-table th {
      padding: 13px 15px;
      text-align: left;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: .06em;
      border-bottom: 1px solid var(--line);
    }

    .trip-table td {
      padding: 16px 15px;
      border-bottom: 1px solid var(--line);
      vertical-align: middle;
      font-size: 13px;
    }

    .trip-row:hover {
      background: rgba(30, 160, 210, .05);
    }

    .trip-number-cell {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .route-btn {
      border: 0;
      border-radius: 9px;
      padding: 8px 12px;
      background: rgba(67, 151, 255, .18);
      color: #8fc5ff;
      font-weight: 800;
      font-size: 11px;
      cursor: pointer;
    }

    .route-btn:hover {
      background: rgba(67, 151, 255, .28);
    }

    .trip-detail-row {
      display: none;
    }

    .trip-detail-row.open {
      display: table-row;
    }

    .trip-detail-row > td {
      padding: 0;
      background: rgba(2, 12, 25, .48);
    }

    .trip-detail-inner {
      padding: 16px;
    }

    .trip-detail-top {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    @media (max-width: 1080px) {
      .toolbar { grid-template-columns: 1fr 1fr 1fr; }
    }

    @media (max-width: 720px) {
      .trip-filter-toolbar {
        grid-template-columns: 1fr;
      }

      .active-trip-heading {
        padding: 15px;
      }

      .active-trip-heading p {
        display: none;
      }

      .trip-table {
        min-width: 0;
      }

      .trip-table thead {
        display: none;
      }

      .trip-table,
      .trip-table tbody,
      .trip-table tr,
      .trip-table td {
        display: block;
        width: 100%;
      }

      .trip-row {
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
      }

      .trip-row td {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 7px 0;
        border: 0;
      }

      .trip-row td::before {
        content: attr(data-label);
        color: var(--muted);
        font-size: 10px;
        letter-spacing: .06em;
      }

      .trip-number-cell {
        width: 100%;
        justify-content: flex-end;
      }

      .trip-detail-row {
        display: none !important;
      }

      .trip-detail-row.open {
        display: block !important;
      }

      .trip-detail-row > td {
        display: block;
      }

      .trip-detail-top {
        display: block;
      }

      .trip-badges {
        margin-top: 10px;
        justify-content: flex-start;
      }

      .app { padding: 11px; }
      .topbar { margin: -11px -11px 13px; padding: 10px 11px; }
      .brand p { display: none; }
      .toolbar { grid-template-columns: 1fr 1fr; }
      .toolbar .wide { grid-column: 1 / -1; }
      .trip-head { grid-template-columns: 1fr; }
      .trip-badges { justify-content: flex-start; }
      .station-grid { grid-template-columns: 1fr; }
      .station + .station { border-left: 0; border-top: 1px solid var(--line); }
      .fp-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .leg-head {
        display: block;
      }

      .leg-summary-pills {
        max-width: none;
        margin-top: 10px;
        justify-content: flex-start;
      }
    }
  
    /* ===== 가독성 향상: 전체 글자 크기 확대 ===== */
    html {
      font-size: 17px;
    }

    body {
      font-size: 17px;
      line-height: 1.55;
    }

    .brand-title {
      font-size: 1.45rem;
    }

    .select,
    .input,
    button {
      font-size: 1rem;
    }

    .active-trip-heading h2 {
      font-size: 1.35rem;
    }

    .trip-table th {
      font-size: .82rem;
    }

    .trip-table td {
      font-size: 1rem;
    }

    .trip-number-cell strong {
      font-size: 1.05rem;
    }

    .route-btn {
      font-size: .84rem;
    }

    .route {
      font-size: 1.12rem;
    }

    .meta,
    .section-title,
    .station-label,
    .service-note,
    .child-service,
    .message-meta {
      font-size: .92rem;
    }

    .pill,
    .status {
      font-size: .84rem;
      padding: 6px 10px;
    }

    .leg-route {
      font-size: 1.12rem;
    }

    .leg-schedule-local {
      font-size: 1rem;
    }

    .leg-schedule-utc {
      font-size: .92rem;
    }

    .station-title {
      font-size: 1.18rem;
    }

    .service-name {
      font-size: 1.02rem;
    }

    .service-card,
    .message-box,
    .fp-item,
    .alert-item {
      font-size: 1rem;
    }

    @media (max-width: 720px) {
      html {
        font-size: 16px;
      }

      body {
        font-size: 16px;
      }

      .brand-title {
        font-size: 1.3rem;
      }

      .trip-table td {
        font-size: 1rem;
      }

      .leg-route {
        font-size: 1.08rem;
      }

      .leg-schedule-local {
        font-size: .98rem;
      }

      .leg-schedule-utc {
        font-size: .9rem;
      }

      .pill,
      .status {
        font-size: .82rem;
      }
    }


    /* ===== 상태 표시 통합 ===== */
    .s-in-progress {
      color: #ffb13b !important;
      border-color: rgba(255, 177, 59, .35) !important;
      background: rgba(255, 177, 59, .08) !important;
    }

    .s-in-progress .dot,
    .s-in-progress i {
      background: #ffb13b !important;
      box-shadow: 0 0 0 3px rgba(255, 177, 59, .10);
    }

    .s-pending {
      color: #ffb13b !important;
      border-color: rgba(255, 177, 59, .35) !important;
      background: rgba(255, 177, 59, .08) !important;
    }

    .s-pending .dot,
    .s-pending i {
      background: #ffb13b !important;
      box-shadow: 0 0 0 3px rgba(255, 177, 59, .10);
    }

    /* Handling 하위항목 등 세부 텍스트 확대 */
    .child-service {
      font-size: 1rem !important;
      line-height: 1.7 !important;
      padding: 4px 0 !important;
    }

    .child-service span:first-child {
      font-size: 1rem !important;
    }

    .child-service .status,
    .child-service .pill {
      font-size: .9rem !important;
    }

    .service-note {
      font-size: .95rem !important;
      line-height: 1.55 !important;
    }

    @media (max-width: 720px) {
      .child-service,
      .child-service span:first-child {
        font-size: .98rem !important;
      }

      .child-service .status,
      .child-service .pill {
        font-size: .86rem !important;
      }
    }


    /* ===== 상태 색상 원래 구분 ===== */
    .s-action-required {
      color: #ff657a !important;
      border-color: rgba(255, 101, 122, .42) !important;
      background: rgba(255, 101, 122, .10) !important;
    }

    .s-action-required .dot,
    .s-action-required i {
      background: #ff657a !important;
      box-shadow: 0 0 0 3px rgba(255, 101, 122, .12) !important;
    }

    .s-pending {
      color: #ffb13b !important;
      border-color: rgba(255, 177, 59, .38) !important;
      background: rgba(255, 177, 59, .08) !important;
    }

    .s-pending .dot,
    .s-pending i {
      background: #ffb13b !important;
      box-shadow: 0 0 0 3px rgba(255, 177, 59, .10) !important;
    }

    .s-in-progress {
      color: #35bdf3 !important;
      border-color: rgba(53, 189, 243, .38) !important;
      background: rgba(53, 189, 243, .08) !important;
    }

    .s-in-progress .dot,
    .s-in-progress i {
      background: #35bdf3 !important;
      box-shadow: 0 0 0 3px rgba(53, 189, 243, .10) !important;
    }

    /* ===== 상위 Trip 행과 상세영역 시각적 구분 ===== */
    .trip-detail-row > td {
      padding: 0 !important;
      background: #06111f !important;
      border-bottom: 2px solid rgba(77, 174, 230, .28) !important;
    }

    .trip-detail-shell {
      margin: 14px 18px 20px;
      border: 1px solid rgba(77, 174, 230, .34);
      border-left: 5px solid #35bdf3;
      border-radius: 15px;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(19, 47, 76, .72), rgba(7, 21, 36, .96));
      box-shadow:
        0 14px 30px rgba(0, 0, 0, .24),
        inset 0 1px 0 rgba(255, 255, 255, .035);
    }

<body>
  <div id="authScreen" style="
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    background:#07111f;
    color:#eef6ff;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans KR',Arial,sans-serif;
  ">
    승인 확인 중...
  </div>

  <div id="appRoot" style="display:none;">
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark"><img src="WFS_LOGO.png" alt="WFS"></div>
        <div>
          <h1>WFS Trip Manager</h1>
          <p>Trip Status Checking System</p>
        </div>
      </div>
      <div class="last-updated" id="lastUpdated">Checking last update...</div>
    </header>

    <section class="toolbar trip-filter-toolbar">
      <select class="select" id="aircraftFilter">
        <option value="">ALL</option>
      </select>
    </section>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      WFS Trip 준비 상태를 불러오는 중입니다.
    </div>

    <main class="trip-list" id="tripList"></main>
  </div>

  <div class="toast" id="toast"></div>
  </div>

  <script>
    /* Apps Script 웹 앱 배포 URL로 변경 */
    const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbxCjPDnKPL3h-BuziI4MgUC3p9HVWyEWbaAEtWZUWKcKYf9CTMbWeN20WFnFmOfYQ7u_w/exec';

    let WFS_APP_STARTED = false;

    const state = {
      response: null,
      trips: [],
      loadingDashboard: false
    };

    // 백엔드는 15분마다 실제 데이터를 갱신합니다.
    // 열려 있는 프론트는 1분마다 저장된 최신 스냅샷만 가볍게 확인합니다.
    const FRONTEND_SNAPSHOT_CHECK_MS = 60 * 1000;
    let frontendSnapshotTimer = null;

    const el = {
      lastUpdated: document.getElementById('lastUpdated'),
      aircraftFilter: document.getElementById('aircraftFilter'),
      loading: document.getElementById('loading'),
      tripList: document.getElementById('tripList'),
      toast: document.getElementById('toast')
    };


    async function init() {
      bindEvents();
      await loadDashboard(false);
      startFrontendSnapshotCheck();
    }


    function startFrontendSnapshotCheck() {
      if (frontendSnapshotTimer) {
        window.clearInterval(frontendSnapshotTimer);
      }

      frontendSnapshotTimer = window.setInterval(function () {
        // 백그라운드 탭에서는 불필요한 조회를 하지 않습니다.
        if (document.visibilityState !== 'visible') {
          return;
        }

        loadDashboard(true);
      }, FRONTEND_SNAPSHOT_CHECK_MS);
    }


    function bindEvents() {
      el.aircraftFilter.addEventListener('change', applyLocalFilters);

      el.tripList.addEventListener('click', function (event) {
        const button = event.target.closest('.route-btn');
        if (!button) return;

        event.stopPropagation();

        const detailId = button.getAttribute('data-detail-id');
        const detail = document.getElementById(detailId);
        if (!detail) return;

        const willOpen = !detail.classList.contains('open');

        closeOpenTripDetails();

        if (willOpen) {
          detail.classList.add('open');
          button.setAttribute('aria-expanded', 'true');
        }
      });

      document.addEventListener('click', function (event) {
        if (event.target.closest('.trip-detail-row')) return;
        if (event.target.closest('.route-btn')) return;

        closeOpenTripDetails();
      });

      // PDF를 열었다가 돌아오거나 백그라운드 탭이 다시 보이면 즉시 최신 스냅샷 확인
      document.addEventListener('visibilitychange', function () {
        if (document.visibilityState === 'visible') {
          loadDashboard(true);
        }
      });
    }


    function closeOpenTripDetails() {

    async function loadDashboard(silent) {
      if (state.loadingDashboard) {
        return;
      }

      if (!BACKEND_URL || BACKEND_URL.includes('PASTE_YOUR')) {
        renderEmpty('BACKEND_URL에 Apps Script 웹 앱 배포 URL을 입력하세요.');
        return;
      }

      state.loadingDashboard = true;

      if (!silent) {
        setLoading(true);
      }

      try {
        const response = await jsonp(BACKEND_URL, {
          action: 'dashboard',
          daysPast: '1',
          daysFuture: '90',
          maxTrips: '10'
        }, 180000);

        if (!response || (!response.success && !response.partialSuccess)) {
          throw new Error(
            response && response.message
              ? response.message
              : '조회 실패'
          );
        }

        const previousGeneratedAt =
          state.response && state.response.generatedAtUtc
            ? String(state.response.generatedAtUtc)
            : '';

        const nextGeneratedAt =
          response.generatedAtUtc
            ? String(response.generatedAtUtc)
            : '';

        state.response = response;
        state.trips = response.trips || [];

        updateLastUpdated(response);
        updateAircraftFilter(state.trips);
        applyLocalFilters();

        if (
          silent &&
          previousGeneratedAt &&
          nextGeneratedAt &&
          previousGeneratedAt !== nextGeneratedAt
        ) {
          showToast('Latest trip data has been updated.');
        }

        if (response.errors && response.errors.length) {
          showToast(
            '일부 API 조회 실패: ' +
            response.errors.length +
            '건'
          );
        }

      } catch (err) {
        // 자동 확인 실패 때는 기존 화면을 지우지 않습니다.
        if (!silent) {
          renderEmpty(err.message || String(err));
          showToast(err.message || String(err));
        } else {
          console.warn(
            'Automatic snapshot check failed:',
            err
          );
        }
      } finally {
        state.loadingDashboard = false;

        if (!silent) {
          setLoading(false);
        }
      }
    }


    function applyLocalFilters() {
      const aircraft = el.aircraftFilter.value.trim().toUpperCase();

      const filtered = state.trips.filter(function (trip) {
        return !aircraft ||
          String(trip.aircraftRegistry || '')
            .trim()

      });

      renderTrips(filtered);

    function updateAircraftFilter(trips) {
      const current = el.aircraftFilter.value;

      const tails = Array.from(
        new Set(
          (trips || [])

                .trim()

            .filter(Boolean)

      el.aircraftFilter.innerHTML =
        '<option value="">ALL</option>' +
        tails.map(function (tail) {
          return '<option value="' + esc(tail) + '">' +
            esc(tail) +
            '</option>';
        }).join('');

      if (tails.indexOf(current) >= 0) {
        el.aircraftFilter.value = current;
      }
    }

    function routeUnderlineClass(trip) {
      const summary = trip && trip.summary ? trip.summary : {};

      // NO STATUS는 밑줄 색상 판정에 영향을 주지 않음
      if (Number(summary.pending || 0) > 0 ||
          Number(summary.inProgress || 0) > 0) {
        return 'pending';
      }

      const actionableCount =
        Number(summary.confirmed || 0) +
        Number(summary.completed || 0) +
        Number(summary.own || 0);

      if (actionableCount > 0 &&
          Number(summary.pending || 0) === 0 &&
          Number(summary.inProgress || 0) === 0) {
        return 'confirmed';
      }

      return 'neutral';
    }

    function updateLastUpdated(response) {
      if (!el.lastUpdated) {
        return;
      }

      const generatedAt =
        response && response.generatedAtUtc;

      if (!generatedAt) {
        el.lastUpdated.textContent =
          'No last update time available';
        return;
      }

      const date = new Date(generatedAt);

      const text = Number.isNaN(date.getTime())
        ? String(generatedAt).slice(0, 16)
        : new Intl.DateTimeFormat('en-CA', {
            timeZone: 'Asia/Seoul',
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit',
            hour12: false
          })
            .format(date)
            .replace(',', '');

      el.lastUpdated.textContent =
        'Last Updated ' +
        text +
        (response.stale
          ? ' · Previous data'
          : '');
    }


    function jsonp(url, params, timeoutMs) {
      return new Promise(function (resolve, reject) {
        const cb = '__wfsTrip_' + Date.now() + '_' + Math.random().toString(36).slice(2);
        const script = document.createElement('script');
        const timer = setTimeout(function () {
          cleanup();
          reject(new Error('백엔드 응답 시간이 초과되었습니다.'));
        }, timeoutMs || 120000);

        function cleanup() {
          clearTimeout(timer);
          if (script.parentNode) script.parentNode.removeChild(script);
          try { delete window[cb]; } catch (e) {}
        }

        window[cb] = function (data) {
          cleanup();
          resolve(data);
        };

        const q = new URLSearchParams(Object.assign({}, params, { callback: cb }));
        script.src = url + (url.includes('?') ? '&' : '?') + q.toString();
        script.onerror = function () {
          cleanup();
          reject(new Error('백엔드 연결에 실패했습니다.'));
        };
        document.head.appendChild(script);
      });
    }


    function formatDateTime(value) {
      if (!value) return '-';
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return value;
      return new Intl.DateTimeFormat('ko-KR', {
        year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit'
      }).format(d);
    }


    function formatLocalSchedule(departure, arrival) {
      return formatDateTimeSuffix(departure, 'L') +
        ' → ' +
        formatDateTimeSuffix(arrival, 'L');
    }


    function formatUtcSchedule(departure, arrival) {
      return formatDateTimeSuffix(departure, 'Z') +
        ' → ' +
        formatDateTimeSuffix(arrival, 'Z');
    }


    function formatDateTimeSuffix(value, suffix) {
      if (!value) return '-';

      const text = String(value)
        .replace('T', ' ')
        .replace(/Z$/i, '')
        .slice(0, 16);

      return text + suffix;
    }


    function formatUtc(value) {
      if (!value) return '-';
      const s = String(value).replace('T', ' ');
      return s.endsWith('Z') ? s.slice(0, 16) + 'Z' : s.slice(0, 16) + 'Z';
    }


    function formatDateOnly(value) {
      if (!value) return '-';
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return String(value).slice(0, 10);

      return [
        d.getFullYear(),
        String(d.getMonth() + 1).padStart(2, '0'),
        String(d.getDate()).padStart(2, '0')
      ].join('-');
    }


    function formatRange(start, end) {
      if (!start && !end) return 'DATE N/A';
      return localShort(start) + ' – ' + localShort(end);
    }


    function localShort(value) {
      return value ? String(value).replace('T', ' ').slice(0, 16) : '-';
    }


    function formatDuration(minutes) {
      const n = Number(minutes || 0);
      if (!n) return '-';
      const h = Math.floor(n / 60);
      const m = n % 60;
      return h ? h + 'H ' + m + 'M' : m + 'M';
    }


    function esc(value) {
      return String(value == null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }


    function showToast(message) {
      el.toast.textContent = message;
      el.toast.classList.add('show');
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(function () {
        el.toast.classList.remove('show');
      }, 3400);
    }

      if (window.CURRENT_PORTAL_USER) {
        sessionStorage.setItem('portalApproved', 'true');
        startWfsAppAfterAuth();
        return;
      }

      window.setTimeout(waitForPortalAuth, 200);
    })();
  </script>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://bomi87.github.io/SK-Aviation-portal/common-auth.js"></script>
</body>
